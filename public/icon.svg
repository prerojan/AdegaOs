<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Circular Dark Background -->
  <rect width="512" height="512" rx="128" fill="#000000" />
  
  <!-- Subtle inner glowing ring -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="#18F2A4" stroke-width="4" stroke-opacity="0.15" />
  <circle cx="256" cy="256" r="215" fill="none" stroke="#18F2A4" stroke-width="8" stroke-opacity="0.05" />

  <!-- Modern Wine Chalic / Cup Silhouette with Glowing Neon Lines -->
  <g transform="translate(128, 100)" stroke="#18F2A4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Liquid glow in glass (Neon Green) -->
    <path d="M 46 95 L 210 95 C 210 160, 190 200, 128 200 C 66 200, 46 160, 46 95 Z" fill="#18F2A4" fill-opacity="0.15" stroke="none" />
    
    <!-- Spark / Bubble effects -->
    <circle cx="100" cy="120" r="8" fill="#18F2A4" fill-opacity="0.8" stroke="none" />
    <circle cx="150" cy="140" r="5" fill="#18F2A4" fill-opacity="0.5" stroke="none" />
    <circle cx="120" cy="160" r="4" fill="#18F2A4" fill-opacity="0.3" stroke="none" />
    
    <!-- Outer rim and glass shape -->
    <path d="M 40 80 C 40 180, 80 220, 128 220 C 176 220, 216 180, 216 80 Z" fill="none" stroke-width="20" />
    
    <!-- Rim line -->
    <line x1="30" y1="80" x2="226" y2="80" stroke-width="16" />

    <!-- Glass Stem -->
    <line x1="128" y1="220" x2="128" y2="300" stroke-width="20" />
    
    <!-- Sturdy Base -->
    <path d="M 70 300 L 186 300" stroke-width="24" />
    <path d="M 50 312 L 206 312" stroke-width="12" />
  </g>
  
  <!-- Ambient "OS" Badge at bottom-right of the glass base -->
  <g transform="translate(290, 310)">
    <rect width="90" height="42" rx="12" fill="#18F2A4" />
    <text x="45" y="27" fill="#000000" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="20" text-anchor="middle" letter-spacing="1">OS</text>
  </g>
</svg>
